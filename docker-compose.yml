networks:
  eraowlops-global-network:
    name: eraowlops-global-network
    driver: bridge

services:
  backend:
    build: ./eraowl-ops-backend
    container_name: eraowlops-backend
    ports:
      - "8000:8000"
    env_file:
      - ./eraowl-ops-backend/.env
      - ./.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    networks:
      - eraowlops-global-network
    restart: unless-stopped

  frontend:
    build: ./eraowl-ops-frontend
    container_name: eraowlops-frontend
    ports:
      - "3001:80"
    networks:
      - eraowlops-global-network
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: eraowlops-redis
    expose:
      - "6379"
    networks:
      - eraowlops-global-network
    restart: unless-stopped

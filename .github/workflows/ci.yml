name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: eraowlops_test
          POSTGRES_USER: eraowlopsadmin
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    defaults:
      run:
        working-directory: eraowl-ops-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest -v
        env:
          DATABASE_URL: postgres://eraowlopsadmin:testpass@localhost:5432/eraowlops_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-for-ci
          JWT_ALGORITHM: HS256

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eraowl-ops-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
